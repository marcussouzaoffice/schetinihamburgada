<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="admin-bg">

<div class="overlay">

<header>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="logoschetini.jpeg">
  </div>

  <nav>
    <span onclick="window.location.href='index.html'">Home</span>
    <span onclick="window.location.href='pedidos.html'">Pedidos</span>
    <span onclick="window.location.href='suporte.html'">Suporte</span>
    <span onclick="window.location.href='admin.html'">Administrativo</span>
    <span onclick="window.location.href='historico.html'">Histórico</span>
  </nav>
</header>

<main class="container container-admin">

  <div id="login" class="panel">
    <h2>Login Admin</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>

  <div id="painel" class="hidden panel">

    <div class="admin-header">
      <img src="LOGOFES.png" alt="Logo FES">
      <h2>Painel Administrativo</h2>
      <p class="admin-system">Food Express System</p>
    </div>

    <div id="dashboardAdmin" class="hidden"></div>

    <h3>Gerenciar Cardápio</h3>
    <p class="admin-info">Use as setas para reorganizar os produtos na ordem que você quiser.</p>

    <div id="cardapioAdmin" class="admin-grid"></div>

    <div class="admin-add">
      <input id="novoProdutoNome" placeholder="Nome do produto">
      <input id="novoProdutoPreco" type="number" step="0.01" placeholder="Preço">
      <button onclick="adicionarProduto()">➕ Adicionar Produto</button>
    </div>

    <div class="admin-actions-grid">
      <button onclick="salvarCardapio()">💾 Salvar Alterações</button>
      <button onclick="zerarHistorico()" class="btn-danger">🗑️ Zerar Histórico</button>
      <button onclick="zerarNumeracaoPedido()" class="btn-warning">#️⃣ Zerar Numeração</button>
      <button onclick="logout()">🚪 Sair</button>
    </div>

  </div>

</main>

<footer>
  MS TECHNOLOGY © 2026
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
